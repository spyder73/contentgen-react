name: frontend-ci

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  frontend-ci:
    name: frontend-ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
